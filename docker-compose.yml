# CareerOS — n8n local setup
# Runs n8n on port 5679 with SQLite storage
# N8N_ENCRYPTION_KEY must be set in .env (never commit it)

version: '3.5'

services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5679:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5679
      - DB_TYPE=sqlite
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_RUNNERS_ENABLED=false
      - N8N_CORS_ALLOWED_ORIGINS=*
      # WHY N8N_CORS_ALLOWED_ORIGINS: allows the portfolio demo (served from
      # Live Server or file://) to POST to the webhook without CORS errors
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  n8n_data:
